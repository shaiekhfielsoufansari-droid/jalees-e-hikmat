<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تربیتی اسباق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* --- سیکیورٹی: رائٹ کلک پروٹیکشن --- */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow-x: hidden;
        }

        /* واپسی بٹن اسٹائل */
        .back-home-btn {
            position: absolute; top: 20px; left: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.85); color: #fbbf24;
            padding: 8px 20px; border-radius: 50px; border: 2px solid #fbbf24;
            text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: 0.3s;
            font-size: 14px;
        }
        .back-home-btn:hover { background: #fbbf24; color: black; }

        /* ہیڈر ڈیزائن */
        header {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #000;
            border-bottom: 5px solid #fbbf24;
        }

        .header-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('pg2.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: clamp(2.2rem, 10vw, 4rem);
            margin: 0;
            color: #fbbf24;
            text-shadow: 3px 3px 8px rgba(0,0,0,1);
        }

        .contact-info { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
        }
        
        .contact-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            direction: ltr; 
            background: rgba(0, 0, 0, 0.9); 
            padding: 8px 18px; 
            border-radius: 30px; 
            border: 1.5px solid #fbbf24; 
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }
        .blink-icon { animation: blink 1.5s infinite ease-in-out; }

        /* مین باڈی */
        main {
            flex-grow: 1;
            background-image: url('pg3.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, 0.4);
            text-align: center;
            color: white;
        }

        /* فوٹر */
        footer {
            background-color: #111;
            color: #ffffff;
            text-align: center;
            padding: 25px 0;
            border-top: 5px solid #fbbf24;
            width: 100%;
        }

        .golden-text { color: #fbbf24; font-weight: bold; }
        .separator { color: #fbbf24; margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <a href="index.html" class="back-home-btn">
            <i class="fas fa-arrow-right"></i>
            <span>واپس جائیں</span>
        </a>

        <div class="header-bg"></div>
        
        <div class="header-content">
            <h1>تربیتی اسباق</h1>
            
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-phone-alt blink-icon" style="color: #4ade80;"></i> 0311-1855512
                </div>
                <div class="contact-item">
                    <i class="fab fa-whatsapp blink-icon" style="color: #22c55e;"></i> 0300-0210419
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h2 style="color: #fbbf24;">جلد اشاعت کی جائے گی!</h2>
            <p>ان اسباق پر کام جاری ہے، بہت جلد یہاں مکمل تربیتی مواد فراہم کر دیا جائے گا۔</p>
        </div>
    </main>

    <footer>
        <div>
            <span class="golden-text">©</span> 
            <span>2026</span>
            <span class="separator">|</span> 
            <span>جملہ حقوق بحق</span> 
            <span class="golden-text">شیخ فیلسوف انصاری</span>
            <span class="separator">|</span>
            <span>محفوظ ہیں</span>
        </div>
    </footer>

    <script>
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 73)) {
                return false;
            }
        };
    </script>

</body>
              </html>
