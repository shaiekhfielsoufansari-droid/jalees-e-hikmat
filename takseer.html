<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- کاپی پروٹیکشن CSS --- */
        body { 
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', Tahoma; 
            /* پہلی جگہ: باڈی وال پیپر تبدیل کیا گیا */
            background-image: url('pg2.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
        }

        /* واپسی بٹن اسٹائل */
        .back-home-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.85); color: #fbbf24;
            padding: 10px 25px; border-radius: 50px; border: 2px solid #fbbf24;
            text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: 0.3s;
        }
        .back-home-btn:hover { background: #fbbf24; color: black; transform: scale(1.05); }

        input, textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .nastaliq { font-family: 'Noto Nastaliq Urdu', serif; }
        
        @keyframes blink-animation {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .blink-icon { animation: blink-animation 1.5s infinite ease-in-out; display: inline-block; }

        .main-header {
            /* دوسری جگہ: ہیڈر وال پیپر تبدیل کیا گیا */
            background-image: url('pg2.jpg');
            background-size: cover; background-position: center;
            color: #fbbf24; padding: 3.5rem 1rem; border-bottom: 6px solid #d97706;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-title { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.2;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9); margin-bottom: 30px; 
        }

        .name-badge {
            background: rgba(0, 0, 0, 0.85); color: #ffffff;
            font-family: 'Arial', sans-serif; padding: 12px 40px;
            border-radius: 50px; border: 2px solid #fbbf24;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem); font-weight: 900;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            margin-top: 20px; display: inline-block;
        }

        .contact-info { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 2.5rem; color: #ffffff; flex-wrap: wrap; }
        .contact-item { display: flex; align-items: center; gap: 8px; direction: ltr; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 25px; border: 1px solid rgba(251, 191, 36, 0.5); font-size: 1rem; font-weight: bold; }

        .input-section {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 2.5rem 1rem; border-bottom: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%;
        }

        .full-width-container { width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }

        .result-box-style {
            /* تیسری جگہ: رزلٹ باکس وال پیپر تبدیل کیا گیا */
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('pg2.jpg');
            background-size: cover; background-position: center;
            border-top: 2px solid rgba(251, 191, 36, 0.6); border-bottom: 2px solid rgba(251, 191, 36, 0.6);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); width: 100%;
        }

        .letter-tile {
            border: 1px solid #cbd5e1; width: clamp(34px, 4.8vw, 50px); height: clamp(34px, 4.8vw, 50px);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1rem, 2.8vw, 1.5rem); font-weight: bold;
        }
        
        .row-even { color: #1e40af; background: rgba(255, 255, 255, 0.98); }
        .row-odd { color: #b91c1c; background: rgba(255, 245, 245, 0.98); }
        
        .special-box { border: 3px solid #000000 !important; background: #fbbf24 !important; z-index: 10; color: #000 !important; transform: scale(1.02); }
        .zamaam-row { background: #94a3b8 !important; font-weight: 900; color: #000; }
        .label-tile { background: #f1f5f9; color: #64748b; font-size: 0.75rem; font-weight: bold; }

        .footer-copyright {
            margin-top: auto; padding: 1.5rem 0;
            /* چوتھی جگہ: فوٹر وال پیپر تبدیل کیا گیا */
            background-image: url('pg2.jpg');
            background-size: cover; border-top: 4px solid #d97706; width: 100%; position: relative; text-align: center;
        }
        .footer-overlay { background: rgba(0, 0, 0, 0.85); position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }
        .copyright-content { position: relative; z-index: 2; color: #ffffff; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; }

        .golden-text { color: #fbbf24; font-weight: bold; }
        .custom-scroll::-webkit-scrollbar { height: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }

        .info-grid { display: grid; grid-template-columns: 1fr; width: 100%; }
        @media (min-width: 1024px) { .info-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <a href="index.html" class="back-home-btn">
        <i class="fas fa-arrow-right"></i>
        <span class="nastaliq">واپس جائیں</span>
    </a>

    <header class="main-header">
        <div class="nastaliq header-title">جفری تکسیر</div>
        <div class="name-badge">شیخ فیلسوف انصاری</div>
        <div class="contact-info">
            <div class="contact-item"><i class="fas fa-phone-alt text-green-400 blink-icon"></i> 0311-1855512</div>
            <div class="contact-item"><i class="fab fa-whatsapp text-green-500 blink-icon"></i> 0300-0210419</div>
        </div>
    </header>

    <main class="full-width-container">
        <section class="input-section">
            <div class="max-w-4xl mx-auto w-full px-4 text-center">
                <input type="text" id="userInput" placeholder="عبارت یہاں لکھیں..." class="w-full p-4 border-2 border-amber-500 rounded-xl text-xl md:text-2xl text-center font-bold outline-none shadow-lg bg-white text-slate-900 focus:ring-4 focus:ring-amber-400 mb-6">
                <div class="flex flex-wrap gap-3 justify-center">
                    <button onclick="calculate('sadar')" class="bg-blue-700 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-800 shadow-md flex-1 transition-transform active:scale-95">تکسیر صدر موخر</button>
                    <button onclick="calculate('mokhar')" class="bg-amber-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-amber-700 shadow-md flex-1 transition-transform active:scale-95">تکسیر موخر صدر</button>
                    <button onclick="clearAll()" class="bg-slate-800 text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-900 shadow-md flex-1 transition-transform active:scale-95">صاف کریں</button>
                </div>
            </div>
        </section>

        <div id="resultView" class="hidden w-full">
            <div class="custom-scroll overflow-x-auto result-box-style p-6 md:p-12 text-center">
                <div id="gridArea" class="inline-flex flex-col border-2 border-slate-800 shadow-2xl"></div>
            </div>

            <div class="info-grid nastaliq">
                <div class="result-box-style p-8 border-r-0 md:border-r-8 border-amber-600 bg-opacity-95">
                    <h3 class="text-3xl font-bold mb-6 border-b border-amber-500 pb-2 text-white text-center">
                        <i class="fas fa-scroll ml-2 text-amber-400 blink-icon"></i>استخراجِ تفصیلات
                    </h3>
                    <div class="text-white space-y-5">
                        <p class="text-2xl">چاروں گوشے: <span id="cornerChars" class="golden-text font-black"></span></p>
                        <p class="text-2xl">حروفِ قلب: <span id="heartCharsText" class="golden-text font-black"></span></p>
                        <p class="text-2xl">سطرِ طلسم: <span id="tilismiRow" class="text-amber-300 font-black tracking-widest"></span></p>
                        <p class="text-2xl">موکلِ علوی: <span id="mokalRes" class="golden-text font-black underline decoration-amber-500"></span></p>
                    </div>
                </div>
                <div class="result-box-style p-8 flex flex-col justify-center items-center bg-opacity-90">
                    <p class="text-2xl text-amber-200 italic mb-2">میزانِ کل (قلب + گوشہ)</p>
                    <p class="text-8xl md:text-9xl font-bold text-white drop-shadow-2xl" id="finalSum">0</p>
                    <div class="mt-4 flex gap-4">
                        <i class="fas fa-star text-amber-400 text-3xl blink-icon"></i>
                        <i class="fas fa-star text-amber-400 text-3xl blink-icon"></i>
                        <i class="fas fa-star text-amber-400 text-3xl blink-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-copyright">
        <div class="footer-overlay"></div>
        <div class="copyright-content nastaliq">
            <span class="golden-text text-2xl">©</span> 2026 <span class="mx-2 text-amber-600">|</span> جملہ حقوق بحق <span class="golden-text mx-1">شیخ فیلسوف انصاری</span> محفوظ ہیں
        </div>
    </footer>

<script>
    /* JavaScript Logic unchanged */
    document.addEventListener('contextmenu', function(e) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's' || e.key === 'i')) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
            }
        }
    });

    const abjad = {'ا':1,'ب':2,'ج':3,'د':4,'ہ':5,'و':6,'ز':7,'ح':8,'ط':9,'ی':10,'ک':20,'ل':30,'م':40,'ن':50,'س':60,'ع':70,'ف':80,'ص':90,'ق':100,'ر':200,'ش':300,'ت':400,'ث':500,'خ':600,'ذ':700,'ض':800,'ظ':900,'غ':1000,'ة':400,'ؤ':6,'ئ':10,'أ':1,'آ':1};

    function clearAll() {
        document.getElementById('userInput').value = "";
        document.getElementById('resultView').classList.add('hidden');
        document.getElementById('gridArea').innerHTML = "";
    }

    function calculate(mode) {
        let rawVal = document.getElementById('userInput').value;
        if (!rawVal) return;
        let cleanText = rawVal.replace(/[\u064B-\u065F\u0670\u0610-\u061A]/g, "");
        let expandedVal = cleanText.replace(/ة/g, 'تہ');
        let valArr = expandedVal.split('').filter(char => char.trim() !== '');
        if (valArr.length === 0) return;

        document.getElementById('resultView').classList.remove('hidden');
        let originalStr = valArr.join('');
        let rows = [[...valArr]];
        let current = [...valArr];

        for (let i = 0; i < 500; i++) {
            let next = [], temp = [...current];
            if (mode === 'mokhar') {
                while (temp.length > 0) { next.push(temp.pop()); if (temp.length > 0) next.push(temp.shift()); }
            } else {
                while (temp.length > 0) { next.push(temp.shift()); if (temp.length > 0) next.push(temp.pop()); }
            }
            rows.push([...next]);
            current = [...next];
            if (current.join('') === originalStr) break;
        }
        render(rows, originalStr);
    }

    function render(rows, original) {
        const grid = document.getElementById('gridArea');
        grid.innerHTML = "";
        let totalCols = rows[0].length;
        let totalRowsCount = rows.length;

        let tRow = document.createElement('div'); tRow.className = "flex";
        tRow.appendChild(createBox("#", "letter-tile label-tile"));
        for(let i=1; i<=totalCols; i++) tRow.appendChild(createBox(i, "letter-tile label-tile"));
        grid.appendChild(tRow);

        let midRows = (totalRowsCount % 2 !== 0) ? [Math.floor(totalRowsCount / 2)] : [(totalRowsCount / 2) - 1, totalRowsCount / 2];
        let midCols = (totalCols % 2 !== 0) ? [Math.floor(totalCols / 2)] : [Math.floor((totalCols - 1) / 2), Math.ceil((totalCols - 1) / 2)];

        rows.forEach((row, rIdx) => {
            let isZamaam = (rIdx > 0 && row.join('') === original);
            let rowDiv = document.createElement('div');
            rowDiv.className = `flex ${rIdx % 2 === 0 ? 'row-even' : 'row-odd'} ${isZamaam ? 'zamaam-row' : ''}`;
            rowDiv.appendChild(createBox(isZamaam ? "زمام" : rIdx + 1, "letter-tile label-tile"));
            
            row.forEach((char, cIdx) => {
                let tile = document.createElement('div'); 
                tile.className = "letter-tile";
                let isHeart = (midRows.includes(rIdx) && midCols.includes(cIdx));
                let isCorner = ((rIdx === 0 || rIdx === totalRowsCount - 1) && (cIdx === 0 || cIdx === totalCols - 1));

                if (isHeart || isCorner) tile.classList.add("special-box");
                tile.innerText = char;
                rowDiv.appendChild(tile);
            });
            grid.appendChild(rowDiv);
        });
        finalize(rows, midRows, midCols);
    }

    function createBox(t, c) {
        let d = document.createElement('div'); d.className = c; d.innerText = t; return d;
    }

    function finalize(rows, midRows, midCols) {
        let heartLetters = [];
        midRows.forEach(r => {
            midCols.forEach(c => {
                if(rows[r] && rows[r][c]) heartLetters.push(rows[r][c]);
            });
        });
        
        document.getElementById('heartCharsText').innerText = heartLetters.join(' - ');
        document.getElementById('tilismiRow').innerText = heartLetters.join('');
        
        let firstRow = rows[0], lastRow = rows[rows.length - 1]; 
        let corners = [firstRow[0], firstRow[firstRow.length-1], lastRow[0], lastRow[lastRow.length-1]];
        document.getElementById('cornerChars').innerText = corners.join(' ، ');
        
        let total = heartLetters.concat(corners).reduce((a,b) => a + (abjad[b]||0), 0);
        document.getElementById('finalSum').innerText = total;
        
        let n = "", temp = total;
        const keys = Object.keys(abjad).sort((a,b) => abjad[b] - abjad[a]);
        for(let k of keys) {
            if(['ة','ؤ','ئ','أ','آ'].includes(k)) continue;
            while(temp >= abjad[k]) { n += k; temp -= abjad[k]; }
        }
        document.getElementById('mokalRes').innerText = n + "ائیل";
    }
</script>
</body>
          </html>
