<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ویدک زائچہ - شیخ فیلسوف انصاری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            -webkit-user-select: none; user-select: none;
            /* پہلی تبدیلی: باڈی وال پیپر */
            background-image: url('pg2.jpg');
            background-size: cover; background-attachment: fixed;
            font-family: 'Noto Sans Arabic', 'Noto Nastaliq Urdu', serif;
            min-height: 100vh; display: flex; flex-direction: column;
            margin: 0; padding: 0;
        }

        /* واپسی بٹن اسٹائل */
        .back-home-btn {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: rgba(0, 0, 0, 0.85); color: #fbbf24;
            padding: 10px 25px; border-radius: 50px; border: 2px solid #fbbf24;
            text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: 0.3s;
        }
        .back-home-btn:hover { background: #fbbf24; color: black; transform: scale(1.05); }

        .nastaliq { font-family: 'Noto Nastaliq Urdu', serif; }

        .main-header {
            /* دوسری تبدیلی: ہیڈر وال پیپر */
            background-image: url('pg2.jpg');
            background-size: cover; color: #fbbf24; padding: 3.5rem 1rem; border-bottom: 6px solid #d97706;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-title { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); line-height: 1.2;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9); margin-bottom: 20px; 
        }

        .name-badge {
            background: rgba(0, 0, 0, 0.85); color: #ffffff;
            font-family: 'Arial', sans-serif; padding: 12px 40px;
            border-radius: 50px; border: 2px solid #fbbf24;
            font-size: clamp(1.2rem, 3.5vw, 1.8rem); font-weight: 900;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            margin-top: 10px; display: inline-block;
        }

        /* رابطہ نمبرات اسٹائل */
        .contact-info { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 2.5rem; color: #ffffff; flex-wrap: wrap; }
        .contact-item { display: flex; align-items: center; gap: 8px; direction: ltr; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 25px; border: 1px solid rgba(251, 191, 36, 0.5); font-size: 1rem; font-weight: bold; }

        .external-link-btn {
            display: block; background: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
            color: white; padding: 20px; border-radius: 15px; border: 3px solid #ffd700;
            text-decoration: none; font-weight: bold; font-size: 1.5rem; margin-top: 20px;
            transition: 0.3s;
        }
        .external-link-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .card-box {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            padding: 2.5rem; border-radius: 2rem; border: 4px solid #fbbf24;
            text-align: center; max-width: 500px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @keyframes blink-animation {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .blink-icon { animation: blink-animation 2s infinite ease-in-out; display: inline-block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <a href="index.html" class="back-home-btn">
        <i class="fas fa-arrow-right"></i>
        <span class="nastaliq">واپس جائیں</span>
    </a>

    <header class="main-header">
        <div class="nastaliq header-title">ویدک زائچہ</div>
        <div class="name-badge">شیخ فیلسوف انصاری</div>
        <div class="contact-info">
            <div class="contact-item"><i class="fas fa-phone-alt text-green-400 blink-icon"></i> 0311-1855512</div>
            <div class="contact-item"><i class="fab fa-whatsapp text-green-500 blink-icon"></i> 0300-0210419</div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="card-box">
            <i class="fa-solid fa-dharmachakra text-7xl text-amber-400 mb-6 blink-icon"></i>
            <h2 class="text-white text-4xl font-bold nastaliq mb-8">ویدک جنم کنڈلی</h2>
            <p class="text-amber-100 text-lg mb-8 nastaliq leading-relaxed">
                مکمل زائچہ اور سیارگان کی تفصیلات دیکھنے کے لیے نیچے دیئے گئے بٹن پر کلک کریں۔
            </p>
            <a href="https://www.drikpanchang.com/jyotisha/kundali/janma-kundali.html" target="_blank" class="external-link-btn nastaliq">
                <i class="fas fa-external-link-alt ml-2 text-sm"></i>
                زائچہ کے لیے یہاں کلک کریں
            </a>
        </div>
    </main>

    <footer style="background-color: rgba(0,0,0,0.85); border-top: 4px solid #d97706; padding: 1.5rem; text-align: center; color: white; margin-top: auto;">
        <div class="nastaliq text-lg">
            <span style="color: #fbbf24;">©</span> 2026 <span style="margin: 0 10px; color: #d97706;">|</span> جملہ حقوق بحق <span style="color: #fbbf24;">شیخ فیلسوف انصاری</span> محفوظ ہیں
        </div>
    </footer>

</body>
</html>
